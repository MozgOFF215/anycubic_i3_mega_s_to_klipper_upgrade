[pwm_cycle_time BEEPER_pin]
pin: PC6
value: 0
shutdown_value: 0
cycle_time: 0.001

[gcode_macro M300]
description: Beep (passive buzzer mode by default)
variable_active_buzzer: 0
gcode:
  {% set S = params.S|default(1000)|float %}
  {% set S = [S, 4000.0]|min %}
  {% set S = [S, 0.0]|max %}
  {% set P = params.P|default(120)|int %}
  {% set G = params.G|default(80)|int %}
  {% if S > 0 %}
    {% if printer["gcode_macro M300"].active_buzzer|int == 1 %}
      SET_PIN PIN=BEEPER_pin VALUE=1
    {% else %}
      {% set CYCLE = 1.0 / S %}
      SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={CYCLE}
    {% endif %}
  {% endif %}
  G4 P{P}
  SET_PIN PIN=BEEPER_pin VALUE=0
  G4 P{G}

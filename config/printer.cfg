[include mainsail.cfg]
[include beeper.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# X Axis
[stepper_x]
step_pin: PF0
dir_pin: !PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PE5
position_min: -5
position_endstop: -5
position_max: 210
homing_speed: 50

# Y Axis
[stepper_y]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PL7
position_endstop: 0
position_max: 210
homing_speed: 50

# Z Axis (right)
[stepper_z]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
rotation_distance: 8
microsteps: 16
endstop_pin: ^!PD3
position_endstop: 0.0
position_max: 210
position_min: -5
homing_speed: 10
homing_retract_dist: 5
second_homing_speed: 3

# Z Axis (left)
[stepper_z1]
step_pin: PC1
dir_pin: PC3
endstop_pin: ^!PL6
enable_pin: !PC7
rotation_distance: 8
microsteps: 16

# Extruder
[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 7.92   # from Marlin M92 E404.21 baseline
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260
max_extrude_cross_section: 1.0

# Bed
[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
control: pid
pid_Kp: 70
pid_Ki: 1.3
pid_Kd: 900
min_temp: 0
max_temp: 110

# Part cooling fan (M106/M107)
[fan]
pin: PH6
kick_start_time: 0.5
off_below: 0.10

# Hotend heatsink fan (auto on when extruder is active/hot)
[heater_fan hotend_fan]
pin: PL5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Mainboard/stepper cooling fan
[controller_fan board_fan]
pin: PH4
heater: extruder,heater_bed
fan_speed: 1.0
idle_timeout: 30

# Display settings
